<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUR STORY - Netflix Style</title>
    <style>
        /* RESET & NETFLIX THEME VARIABLES */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #141414; /* Netflix standard background */
            --paper: #ffffff;
            --muted: #a3a3a3;
            --net-red: #E50914;
            --card-bg: #181818;
            --shadow: rgba(0,0,0,0.75);
        }

        body {
            background-color: var(--bg);
            color: var(--paper);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        /* OVERLAY PEMBUKA - Kunci Interaksi Audio */
        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #intro-overlay h2 {
            color: var(--net-red);
            font-weight: 800;
            margin-bottom: 30px;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #open-btn {
            padding: 12px 40px;
            font-size: 1.2rem;
            background: transparent;
            border: 2px solid var(--paper);
            color: var(--paper);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
        }

        #open-btn:hover {
            background: var(--paper);
            color: #000;
        }

        /* HERO SECTION - NETFLIX STYLE */
        .netflix-hero {
            position: relative;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            padding: 0 4%;
            overflow: hidden;
        }

        /* Latar Belakang Video Absolut */
        .hero-bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        /* Gradien Gelap & Blur untuk Keterbacaan (Seperti UI Netflix) */
        .hero-vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: 
                linear-gradient(to right, rgba(20,20,20,0.9) 0%, rgba(20,20,20,0.4) 50%, transparent 100%),
                linear-gradient(to top, var(--bg) 0%, transparent 20%);
            /* Efek blury di belakang layar secara halus */
            backdrop-filter: blur(2px);
        }

        /* Konten Hero (Kiri Rata) */
        .hero-content {
            max-width: 600px;
            z-index: 2;
        }

        /* Logo Film / Judul Besar */
        .hero-content h1 {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 900;
            line-height: 1;
            margin-bottom: 15px;
            color: var(--paper);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            letter-spacing: -2px;
        }

        /* Badge Top 10 Hari Ini */
        .top-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .top-10-icon {
            background-color: var(--net-red);
            color: white;
            font-weight: bold;
            font-size: 0.7rem;
            padding: 4px;
            line-height: 1;
            text-align: center;
            border-radius: 2px;
        }

        .top-10-text {
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .movie-description {
            font-size: 1.2rem;
            line-height: 1.4;
            color: #fff;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9);
            margin-bottom: 30px;
            max-width: 90%;
        }

        /* Tombol Netflix */
        .hero-buttons {
            display: flex;
            gap: 15px;
        }

        .hero-buttons button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px 24px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn-play {
            background-color: white;
            color: black;
        }

        .btn-play:hover {
            background-color: rgba(255,255,255,0.7);
        }

        .btn-info {
            background-color: rgba(109, 109, 110, 0.7);
            color: white;
        }

        .btn-info:hover {
            background-color: rgba(109, 109, 110, 0.4);
        }

        .hero-buttons svg {
            width: 24px;
            height: 24px;
        }

        /* Label usia pojok kanan */
        .age-rating {
            position: absolute;
            right: 0;
            bottom: 20%;
            background-color: rgba(51,51,51,0.8);
            border-left: 3px solid #dcdcdc;
            padding: 8px 40px 8px 15px;
            font-size: 1.1rem;
            font-weight: bold;
        }

        /* HORIZONTAL SCROLL WRAPPER */
        .horizontal-wrapper {
            height: 400vh; 
            position: relative;
            background-color: var(--bg);
        }

        .horizontal-container {
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            overflow: hidden;
            background-color: var(--bg);
        }

        .gallery {
            display: flex;
            gap: 2vw; 
            padding: 0 4vw;
        }

        .card {
            width: 300px;
            height: 170px; 
            background: var(--card-bg);
            border-radius: 4px;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease, z-index 0.3s ease;
        }

        .card:hover {
            transform: scale(1.15);
            z-index: 10;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* OUTRO SECTION */
        .outro {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            background-color: var(--bg);
        }
        
        .outro h2 {
            font-weight: 300;
            color: var(--paper);
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <audio id="bgm" src="lagu-manis.mp3" loop></audio>

    <div id="intro-overlay">
        <h2>Siap Memulai?</h2>
        <button id="open-btn">Masuk</button>
    </div>

    <section class="netflix-hero">
        <video class="hero-bg-video" autoplay loop muted playsinline poster="https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=1600&q=80">
            <source src="momen-romantis-bg.mp4" type="video/mp4">
            <source src="momen-romantis-bg.mov" type="video/quicktime">
        </video>
        
        <div class="hero-vignette"></div>
        
        <div class="hero-content">
            <div class="top-badge">
                <span class="top-10-icon">TOP<br>10</span>
                <span class="top-10-text">Momen No. 1 di Hati Hari Ini</span>
            </div>
            
            <h1 class="movie-title">HAPPY BIRTHDAY</h1>
            
            <p class="movie-description">
                I LOVE HER SO MUCHH HAPPY BIRTHDAY
            </p>
            
            <div class="hero-buttons">
                <button class="btn-play" id="btn-play">
                    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
                    Putar Cerita
                </button>
                <button class="btn-info" id="btn-info">
                    <svg viewBox="0 0 24 24"><path d="M11 7h2v2h-2zm0 4h2v6h-2zm1-9C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z" fill="currentColor"/></svg>
                    Selengkapnya
                </button>
            </div>
        </div>

        <div class="age-rating">18+</div>
    </section>

    <div class="horizontal-wrapper" id="cerita">
        <div class="horizontal-container">
            <h3 style="position: absolute; top: 10%; left: 4vw; font-size: 1.5rem; color: #e5e5e5; z-index: 5;">Karena kamu suka <span style="font-weight: bold; color: white;">Menghabiskan Waktu Bersama</span></h3>
            <div class="gallery">
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1518199268815-95a17b806141?w=500&q=80" alt="Foto 1">
                </div>
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1529333166437-7750a6dd5a70?w=500&q=80" alt="Foto 2">
                </div>
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1511895426328-dc8714191300?w=500&q=80" alt="Foto 3">
                </div>
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=500&q=80" alt="Foto 4">
                </div>
            </div>
        </div>
    </div>

    <section class="outro" id="outro">
        <h2>Bersambung ke episode berikutnya...<br>Aku sayang kamu.</h2>
    </section>

    <script src="https://unpkg.com/@studio-freight/lenis@1.0.39/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script>
        // 1. INISIALISASI LENIS
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            direction: 'vertical',
            smooth: true,
        });

        lenis.stop(); // Kunci scroll awal

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        // 2. REGISTRASI SCROLLTRIGGER
        gsap.registerPlugin(ScrollTrigger);

        // 3. LOGIKA UNLOCK & AUDIO (Persis dari index git.html)
        const openBtn = document.getElementById('open-btn');
        const overlay = document.getElementById('intro-overlay');
        const bgm = document.getElementById('bgm');

        openBtn.addEventListener('click', () => {
            // Logika pemutaran musik yang simpel dan andal
            try {
                bgm.play();
            } catch (e) {
                console.log("Audio file belum siap atau diblokir browser.");
            }

            lenis.start(); 
            gsap.to(overlay, {
                opacity: 0,
                duration: 0.8,
                onComplete: () => {
                    overlay.style.display = "none";
                    gsap.from(".hero-content", { opacity: 0, x: -50, duration: 1.5, ease: "power3.out" });
                }
            });
        });

        // 4. INTERAKSI TOMBOL NETFLIX
        document.getElementById('btn-play').addEventListener('click', () => {
            lenis.scrollTo('#cerita', { duration: 1.5 });
        });

        document.getElementById('btn-info').addEventListener('click', () => {
            lenis.scrollTo('#outro', { duration: 2 });
        });

        // 5. HORIZONTAL SCROLL
        const gallery = document.querySelector('.gallery');
        function getScrollAmount() {
            let galleryWidth = gallery.scrollWidth;
            return -(galleryWidth - window.innerWidth);
        }

        const tween = gsap.to(gallery, {
            x: getScrollAmount,
            ease: "none"
        });

        ScrollTrigger.create({
            trigger: ".horizontal-wrapper",
            start: "top top", 
            end: () => `+=${getScrollAmount() * -1}`, 
            pin: ".horizontal-container", 
            animation: tween,
            scrub: 1, 
            invalidateOnRefresh: true 
        });

        // 6. VIDEO FALLBACK HANDLING (Menjaga agar layar tidak blank jika video gagal muat)
        const bgVideo = document.querySelector('.hero-bg-video');
        const hero = document.querySelector('.netflix-hero');
        
        bgVideo.addEventListener('error', () => {
            hero.style.backgroundImage = "url('https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=1600&q=80')";
            hero.style.backgroundSize = 'cover';
            hero.style.backgroundPosition = 'center';
            bgVideo.style.display = 'none';
        });
    </script>
</body>
</html>
